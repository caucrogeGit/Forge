<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - {{ app_name }}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <main class="bg-white rounded border border-slate-200 shadow-sm p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-slate-900 mb-2 text-center">Connexion</h1>
        <p class="text-sm text-slate-500 mb-6 text-center">Starter Utilisateurs / authentification</p>

        {% if erreur %}
        <p class="text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2 text-sm mb-4">{{ erreur }}</p>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label class="block text-sm font-medium text-slate-700">Identifiant</label>
                <input type="text" name="login" value="{{ login }}" required autofocus
                    class="mt-1 w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Mot de passe</label>
                <input type="password" name="password" required
                    class="mt-1 w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>

            <button type="submit" class="w-full bg-orange-600 text-white py-2 rounded hover:bg-orange-700">
                Se connecter
            </button>
        </form>
    </main>
</body>
</html>

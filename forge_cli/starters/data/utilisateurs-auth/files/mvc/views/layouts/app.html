<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name | default("Forge") }}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-slate-100 min-h-screen">
    <nav class="bg-slate-900 text-white px-6 py-4 shadow flex justify-between items-center">
        <a href="/dashboard" class="text-xl font-bold">Forge Auth</a>
        <div class="flex items-center gap-4">
            <a href="/profil" class="text-sm text-white/80 hover:text-white">Profil</a>
            <form method="post" action="/logout" style="display:inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded cursor-pointer">
                    Déconnexion
                </button>
            </form>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-8 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
